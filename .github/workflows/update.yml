name: Update PH Trending Catalog

on:
  schedule:
    - cron: "0 20 * * *"   # Runs daily at 4AM PH time (UTC+8)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node script.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git add catalog/movie/ph_trending_movies.json
          git add catalog/series/ph_trending_tv.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily update"
          git push
